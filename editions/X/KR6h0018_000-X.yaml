body:
  text: 地藏菩薩本願經科註序一月普現一切水一切水月一月攝此言聞者故多而知者或寡苟知之則知地藏菩薩以一身現多身而多身復一身初無所作又經歷無量無邊佛剎微塵數劫不間一剎那於一剎那經歷無量無邊佛剎微塵數劫曾無有異如是則天堂地獄諸佛眾生苦樂逆順善惡好醜如谷響鏡華覓其形相了不可得故曰度盡眾生實無度者雖然其奈六極之類為無明羂所覆未出三界不免妄嬰諸苦繇是菩薩乘夙願轂以種種方便而捄度之使其離苦得樂以至無上菩提而後已於戲此菩薩大慈大悲大孝大願大威神力悉不思議假使以虗空為口雷霆為舌盡塵沙劫讚嘆其無量功德海中一滴之相猶不能盡況區區筆墨乎龍飛戊辰秋崎陽大德真常公攜浙中運遐椉法師新編地藏經科注將欲梓行來謁予序葢以常公為法檀度恒與四部眾演說是經意有在也予輒然沈啟讀嘆未曾有乃知運法師孝德道力精進勇猛越乎倫類而且具般若智獲無礙辨得非當代教門之領袖與資生利物莫越於斯鍥而傳諸不可後矣旹貞亨五秊無射月朔日支那嗣祖沙門高泉性潡敬題於佛國方丈地藏菩薩本願經科注序原夫百川具流至海而極一乘圓果稱性而週華藏十三重處處現遮那之玅體鐵圍百億土塵塵顯地藏之願門但以四弘廣被萬行齊彰統神變而無窮運悲心而叵竭地藏菩薩本願經者是唐于闐實叉所譯故其言詞簡約義趣幽深緣起無生宛合雜華之旨體空成事冥符起信之文所以放光集會歎世主之玅嚴法界回施較成佛之福利為欲表揚聖母之厚德故此廣讚地藏之洪名良由淨法身因性空而包納種智果從心地以發生然此因果圓融主伴交徹佛眼難窺其奧聖心莫測其微故知心通則淨剎非遙情隔則凡境是異煩惱業緣甚可怖畏受報醜惡何忍見聞如因目中之赤眚妄現燈上之毛輪急須辦成佛之資糧悟惟心之自性遂使迷途饑饉時忻逢王膳火宅炎𦦨處頓獲清凉至於聞名覩相罪滅河沙禮念歸依福增劫石良以一文之玅攝義無遺故一偈之功能破地獄此經功德真不可得而思議者也吾浙古監匡菴運遐法師者禪觀精修顯密備究甞往天谿之門年來杜跡注釋部帙雖多而此經科注可謂獨步矣長崎德苑真常師信敬此經素奉菩薩見而悅之意欲轉布甚合予願顧惟大士威神不可思議故得塵剎流通寧止四海耶今將授梓屬予弁端予向最敬此不思議經王遂合掌讚歎普願見聞隨喜者悉得任運流入薩婆若海以至圓滿無上佛果菩提而後已是為序時貞亨五年歲在著雍執徐清和浴佛日東明悅峰章熏盥敬題地藏菩薩本願經科注序地藏菩薩本願經者頓脫生死之捷徑速到涅槃之津梁起死回生之良藥閉惡興善之寶鑑也乃至以信手拔疑根用戒足登樂剎慧目定心無量功德靡不具足者其唯此經歟是故地藏菩薩實為羣生所依福田之根本也若能歸敬此菩薩者則眾苦悉除諸願滿足現在能得安隱將來必定解脫若稱洪名或歷耳根永滅重罪終至寶果是皆大士不可思議慈願力之所致其慈山願海實過於諸大菩薩者日劫相倍矣是以釋迦世尊將人天眾囑此大士復讚之曰一彈指間歸依地藏菩薩是諸眾生即得解脫三惡道報也原夫佛法寬廣行門無量所有諸善功德之中而以發心起願為最要緬惟菩薩往昔作長者子及光目女時而發心起願齊修六度圓證三身恒沙功德皆悉具足故今播名十方分身沙界廣度眾生者皆由發大心起大願故故知發心即諸願之根本一切功德莫不由是而生然而本具大願從智體起拔濟弘誓由悲用生始從發心終至成道引行趣果願為之本是故成佛莫先於願所謂無願多退如牛無御如畵無膠如坏未火終不可用故經云比丘不發誓者終不成佛道誓願之福不可稱計得至甘露滅盡之處也予甞深翫是經審以慈孝願行為宗要何者以光目女有大慈愍心為母發大願故然則慈能生孝因孝發願由願興行開則成慈孝願行合則為慈願也頃支那國有運遐法師以自所編地藏菩薩本願經科注寄送崎陽興福悅峯師師即運法師同省也甞聞運師於病中而注是經凡成六卷其功豈易言哉此經自唐至今千有餘載甫有注釋之者吁亦可謂難矣是誠菩薩護念法師善願病魔既退勇猛莫超佛言勇猛名地藏然則運遐法師豈非能契佛意者歟予欲請此注梓行於世悅師諾然授之予不勝喜如獲異寶今既付梓普願見者聞者知地藏菩薩本願功德利益之事則植將來之智種而且見果畏因息惡勤善遣妄歸真仰信受持如食金剛決定不消終得佛果以此不思議尊經實為羣生之慈澤潤物無窮逢是妙典多劫慶幸莫大於此故不揣愚陋而為之序旹貞享五年歲次戊辰季春上澣吉旦寶池釋真常稽首敬撰地藏經綸貫科注緣起地藏本願經者乃我佛所說之孝經也原其所以說者弭不知恩分之深謗隆諭親以道之大本也是以我佛將熄應火昇忉利天為母談經令見道跡正以示出世之大孝其在我釋氏歟然必乘時放光集分身地藏於天宮者舉行孝之樣子也以大士因地為婆羅門女及光目女皆因救母始發僧那與我佛之心同聲合響故說此地藏本願之經也當知此經我佛以未來天人付地藏於忉利待彌勒於華林誠為業海之慈航昏途之大炬趣人天之徑路入佛道之要門捨是而之焉恐倀倀乎無所歸矣今詳其由以見其實原夫一經宗要大分四章初明能化之主即大士分身泥犁以孝行化令生人天之主也次明所化之機即不孝二親三寶造惡墮苦之罪輩也三明度脫之緣即令人讀孝順之經供大孝之像成機感度脫之緣也四明成佛之因即令其念佛孝名布施順福得成無上之菩提也故梵網云釋迦牟尼佛成無上正覺已初結菩薩波羅提木叉孝順父母師僧三寶豈非孝順之行為一經之正宗者哉序者序此通者通此初中後善純一無雜即教主出世之本懷諸佛大事之因緣耳抑豈與法華同功而比德殆將尤大而尤難者也何乃化道未隆法運仍塞自唐翻梵以來迨今尚無撰集法門殊為闕典先輩略不關心抑又何也予自幼出俗失奉慈嚴既長遊學尤疎定省後將迎侍業已化去臨風徒戚欲養奚从乃於康熈己未冬焚香繕寫一部每遇十齋日披衣敬讀一過為資冥之大猷作酬恩之常課輒於展卷之初率多鮮注之感今既年逾耳順尋將之沒咸池不即立言恐虗願念雖乏懸判彌天之大筆殊闕冥搜安祖之精思顧此圓經寧容冷視遂綜綸貫而釋題仍輯科注以銷句大要顯我佛之悲心昭地藏之本願補法門之闕典啟後學之孝思而已稿成鋟梓請教高明第吾菴向闕藏典協力無人寧辭掛一漏萬之誚儻蒙達士披詳幸鑑愚忱所志伏望同遵本願並渡生津則令佛日長懸朗銕圍兩山之黑暗可使幽關恒啟銷泥犁億劫之辛酸庶不負我佛說法天宮囑累大士一片悲孝之心則是我等報恩之地矣故敘緣起以弁簡端旹康熈上元甲子嘉平丁丑佛成道日嗣興天台教觀正宗第五世青蓮苾芻靈椉撰
