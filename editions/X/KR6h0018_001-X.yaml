body:
  text: 原夫一念自性體元湛寂自性之心用本虗靈無相無名絕思絕議作群生之依止為萬法之根源究竟號中道正空褒美稱第一義諦諸佛悟之則三身圓顯眾生迷此則六道循環雖迷悟之有殊而心性之無別故古德云指虗空世界悉我自心考善惡報應竝是惑心既本一心而貫諸法故我佛法門惟以心為道也華嚴經云心如工畵師造種種五蘊一切世間中無不由心造起信論云有法能起摩訶衍信根所言法者謂眾生心是心則攝一切世間出世間法皆此意也是則地藏菩薩所云一切諸法從心所起與心作相和合而有共生共滅同無有住以一切境界但隨心所緣念念相續故而得住持暫時為有者正所以示此心地法門之指爾今且置悟秪論其迷其天人修羅循善品而輕升地獄鬼畜由惡業而沉墜其墜之鬼畜有輕重之分而沉乎地獄無大小之別總由無明之顛倒致有獄戶之正邊故知凡夫由昧心源而隨妄念妄造惡業妄受苦報不憑至聖之大悲曷解倒懸之極苦是以地藏慈王偏向幽冥界內以同體慈悲劫劫救援而未艾釋迦文佛特昇忉利天中報聖母恩德諄諄付囑以頻申令向佛法中獻少水少華並脫幽途之苦俾從大士前能一瞻一禮咸蒙勝地之歡功莫京焉義叵量矣椉雖生末運幸遇真乘聿崇隨喜之心用作津梁之地聊申管見略釋題名冀三寶之冥加綜諸文而融貫普願見聞同趣樂土云爾今先通釋名題次乃總示觀法三則別解經文準智者大師釋經方軌先明五重玄義一釋名二辯體三明宗四論用五判教相所以五重預釋者以是經中幽玄之義令人一覽即能詮名識所詮體欲顯此體須明宗要宗成體顯妙用得力然後判屬時味部教則義旨泠然昭乎心目譬之擬觀山海先閱圖經未出門庭而情景宛在矣今以不思議人法為名不思議性識為體不思議行願為宗不思議方便為用開顯無上醍醐為教相釋名中地藏菩薩本願六字是別題別諸經故經之一字是通題通餘經故別題復分人法地藏菩薩是人本願是法原此經名佛自結三種一名地藏本願亦名地藏本行亦名地藏本誓力經今獨標本願一名者以願必行行行成必有與拔之力故舉本願一名任運攝得餘二人名復分通別地藏是別菩薩是通地藏之名準佛說八大菩薩曼陀羅經應云乞灑二合訶羅惹義翻地藏若準諸翻譯應言瞿薩翻地俱舍或比迦或摘迦翻藏經云如地諸有情所依一不斷乃約喻立名也夫地本一物而所藏者無量葢為四大之首居五行之中元氣所生萬物之祖其卦為坤其德曰母周易云至哉坤元萬物資生含弘光大品物咸亨體用廣厚德大難名所以能持能育能載能生此約儒書釋也若準四念處釋十地云從初地具有住持生長荷負義至後究竟亦具三義此則約性為地因修萬行果圓萬德皆具三義十輪經云隨所在處若諸有情以諸種子植於荒田或熟田中若勤營務或不營務有能至心稱名念誦歸敬供養地藏菩薩摩訶薩者此善男子功德妙定威神力故令彼一切果實豐稔所以者何此善男子曾過無量無數大劫於過數量佛世尊所發大精進堅固誓願由此願力為欲成熟諸有情故常普住持一切大地常普住持一切種子能令大地一切草木根䰅芽莖枝葉華果皆悉生長藥糓苗根華果茂實成熟潤澤香潔輭美又云譬如大地一切種子樹山稼穡地身眾生之所依止此善男子亦復如是一切殊妙菩提分法之所依止良由菩薩於過去不可說不可說無數劫來散影分形放光說法恒處幽冥界內常教六道眾生或已成佛道或久階真因或暫住聲聞緣覺或在天上人間乃至未來眾生天宮囑令度脫正如大地一切賴以住持生長荷負故經云心如大地能安一切以故佛說心力為大皆約心以明地也藏者亦約喻立正以世間七寶庫藏例同出世三德秘藏涅槃經云如人七寶不出外用名之為藏去聲其人所以藏平聲積此寶為未來故所謂穀貴賊來侵國值遇惡王為用贖命財難得時乃當出用諸佛秘藏亦復如是故章安云隱故名秘覆故名藏眾生不解稱為秘密法界包含攝一切法用不可盡名之為藏以眾生性具三千之寶為煩惱六賊所覆意識惡王所害乃出此三德秘藏用贖常住之命今地藏之名正取乎此三德秘藏蘊在一切眾生身心之內諸佛悟之而證得眾生迷之而流轉然此秘藏初無改移故地藏薩埵從發僧那之初及住等覺之後自行化他總不離此心秘藏也此心秘藏即是涅槃輔行云菩薩初心常觀涅槃行道自行初修也亦令眾生常觀涅槃化他初修也安置諸子秘密藏中化他後入也我亦不久自住其中自行後入也故知自他初心無不皆修自它後心無不皆入今準此義輒釋其名梵名摩訶般涅槃那此云大滅度大即法身滅即解脫度即般若此三法中一一皆具常樂我淨故名為德此之四德不離我心彼之四藏不越乎地如彌勒成佛時其國有轉輪王名曰儴佉上如羊切壤平聲下丘於切音區亦云霜佉此翻貝乃珂貝耳賢愚經云勝伽居翅頭末城彌勒成佛時有四大寶藏同時顯露一一大藏各有四億小藏圍繞伊鉢多大藏金藏在乾陀羅國般軸迦大藏銀藏在彌提羅國賓伽羅大藏明月珠藏在須羅吒國儴佉大藏瑠璃藏亦名珂貝藏在波羅奈古仙山處此之四藏並在閻浮提地今之四德咸具賴耶識中金譬常德色不變故銀譬樂德悅人心故明珠譬我德現色自在故瑠璃譬淨德內外明徹故又復應知此之四藏未顯現時各有龍神密護守而不失既開發後無守護者眾人見之心不貪著正喻心地寶藏雖在迷時隱而不失正當悟處證而不著故知心藏具足眾寶即空假中無不如意心佛眾生三無差別地藏之名其義若此故十輪經佛告好疑問菩薩云如是大士成就如是不可思議諸功德法是諸殊勝功德伏藏是諸解脫珍寶出處所以者何地藏菩薩利益安樂一切有情所願滿足如如意寶亦如伏藏如是大士為欲成熟諸有情故久修堅固大願大悲勇猛精進過諸菩薩是故汝等應當供養今我佛於忉利天宮以法界眾生殷勤付囑地藏令娑婆世界至彌勒出世以來眾生悉使解脫永離諸苦遇佛授記者正欲開示悟入佛之知見四德大寶盡安置秘密藏中故也菩薩具足應云菩提薩埵大論釋云菩提名佛道薩埵名成眾生能以智上求菩提用悲下救眾生天台云用諸佛道成就眾生故名菩提薩埵然菩薩之名合具四教今既開顯的指在圓復貫地藏於通名之上雖通仍別矣次釋本願之法本即本昔梵名尼坻此方翻願希須樂欲之意志求滿足之稱乃菩薩昔生為婆羅門女及光目女時所發之大願也亦即本性由菩薩托根性地以隆其願本所謂仰觀大覺積劫度生都無懈倦者為滿本地之願也又即本性之力用大士稱本立願乃自心起信還信自心譬樹之因地發根根深本大則枝葉依之而敷榮華果由之而茂實狂風雖大不能動搖願不依諦名為狂願諦不從心目為邪諦今以心為地諦為根願為本然後正行之枝敷暢助道之葉葱七覺淨華八正道果成實法林之樹莊嚴總持之苑故須稱本立願方能要制其心縱遇境風不能沮壞此從本立願之大致也然有通別通即四弘誓願大悲懺云夫四弘者依四諦起四諦者二示世間苦因果二示出世樂因果一切菩薩欲拔此苦欲與此樂故依之立四誓也依苦諦立云眾生無邊誓願度依集諦立云煩惱無數誓願斷依道諦立云法門無盡誓願知依滅諦立云佛道無上誓願成一切菩薩俱發故名為通若七佛經中或四願八願十二願及彌陀四十八願觀音十六願等別在一人故名為別若準今經婆羅門女及光目女皆為母發心而救六道則以孝行為大士本時之別願也又復地藏菩薩所發本願通別兼收總以四弘是願本靡時不發別以悲心偏向受苦眾生永作幽冥教主故若通若別竝從本性而發雖分通別無不為拔世間苦因果為與出世樂因果而權實偏圓務須甄別四明云仍須了知始終等相體性融即荊溪云初心遍攝觀惑法界即惑成智即生成滅名圓四誓故了前二誓拔性德之苦後二誓與性德之樂性之苦樂何須拔與即無作之誓願也今地藏大士於無數劫前發弘誓願荷負罪苦六道眾生教令住持正法出生一切功德忍苦忍難大慈大悲故名地藏菩薩本願也釋別名竟經者聖教之都名除律論外通受此稱西域記梵名素怛覽或言無翻以含涌泉義昧無盡故出生能生妙善故繩墨楷定邪正故顯示理示正能故結鬘貫穿諸法故之五義故乃多含不翻或言有翻翻經翻論翻法本翻線翻善語教此皆約義而翻也天台且據一名為正不使二家有怨從古及今譯梵為漢皆題為經以此方周孔之教名為五經然眾典雖單題經而諸論皆曰契經謂上契二諦之理下契三根之機又訓常訓法各有三義魔外不改名教常真正不雜名行常湛然不動名理常法可軌行可軌理可軌也若佛地論訓貫穿攝持者用結鬘與線之意耳慈恩云為常為法是攝是貫庶令同出苦津終歸覺岸如是一種人法兩重通別巧借妙喻以立題名故云地藏菩薩本願經第二辯不思議性識為體者約三意立一憑準經論二迷悟根源三菩薩本識本經云一切眾生未解脫者性識無定為善為惡逐境而生又云念佛菩薩名字歷臨終人耳根或聞在本識此識乃的指第八識也故毗盧三摩地法及金剛頂蓮華部心皆云是心為何物煩惱習種子善惡皆由心心為阿賴耶起信云心生滅者依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名為阿梨耶識則無明法性共住為因不其然乎真諦就名翻無沒識取不失之義奘師就義翻為藏識能含藏諸法種故葢此識體具能藏所藏執藏三法故名為藏故宗鏡云第八本識廣大無邊顯心原而無外包性藏以該通擅持種之名作總報之主建有情之體立涅槃之因據此立體諸法咸收可謂挈衣之領而提網之綱矣言迷悟根源者起信云此依阿梨耶識說有無明不覺而起能見能現能取境界故名此識為所知依能與染淨所知諸法為依止故又名種子識能徧住持世出世間諸法種子故此正維摩所云從無住本立一切法也荊溪釋曰無明為一切法作本無明即法性無明即復以法性為本當知諸法亦以法性為本法性即無明法性復以無明為本法性即無明法性無住處無明即法性無明無住處無明法性雖皆無住而與一切諸法作本是則無住無相事理等常立一切法悟迷差別故占察經云但從無始世來與無明心俱癡闇因緣熏習力故現妄境界以依妄境界熏習因緣故起妄相應心計我我所造集諸業受生死苦說彼法身名為眾生若如是眾生中法身熏集而有力者煩惱漸薄能厭世間求涅槃道信歸一實修六波羅蜜等一切菩提分法名為菩薩若如是菩薩中修行一切善法滿足究竟得離無明睡者轉名為佛當知如是眾生菩薩佛等但依世間假名言說故而有差別而法身之體畢竟平等無有異相文故知不達其具德識心便須緣真如理而斷九界修染修惡何名不思議哉故宗鏡云此識建立有情無情發生染法淨法若有知有覺則眾生界起若無想無慮則國土緣生因染法而六趣回旋隨淨法而四聖階降可謂凡聖之本根器之由了此識原何法非悟證斯心性何境不真可謂絕學之門棲神之宅故立此體為迷悟根原方顯大士恒沙界內散影分形生死海中隨機引導拔根涸源翻迷成悟正欲顯此不生滅法性之體秪在生滅無明妄想之中故南嶽云道源不遠性海非遙但向己求莫從他覓正斯之謂言菩薩本識者光明玄云阿梨耶識即是第八無沒識猶有隨眠煩惱相續中眠故名隨眠別而分之是菩薩識大論云在菩薩心名為般若即其義也葢此識為菩薩見佛勝相之本以如來高明身相皆與虗空等量以業識而見以中智而觀是故地藏於忉利天宮合分身見佛正憑此本識也又復此識為中道應本起化之源所謂闡提不斷性德之善遇緣善發佛亦不斷性惡同惡而化今地藏大士了達闡提等修惡之事全體即是性惡之理邊邪無非中道五逆當處解脫普現色身游化諸趣點此迷源令知平等正憑此本識而起諸大化此即居初位而總號賴耶處果位而唯稱無垢備本後之智地成自他之利門其功豈淺尠哉有此三義故立不思議性識為今經之正體也問有師云性識屬事不當為體應指識性之理始是體義必謂準經性識而立此性乃虗妄習性焉可據此立經體耶此言殊為允當師必不然者何說之從乎答識性之指于義有憑性識之立其文可據如今家解維摩無住本法性無明二俱作本已引勿論秪如妙玄明二諦云但點法性為真諦無明十二因緣為俗諦此俗非事而何此是即理之事既名理毒性惡亦號性染隨緣故釋籤云無明是迷真之始法性則全指無明無始時來奚嘗非真俗則百界千如真則同居一念須知同一性故方能同居一念輔行所謂三千不出一念法性三千不出一念無明是也況今家釋華嚴心造之文有二一約理造即是具二者約事即三世變造等然竝由理具方有事用故法性借力助于無明方成六道染法今立此性識為體正為利根人即事顯理故大經云十二因緣名為佛性無明與愛是二中間即是中道但理無所存徧在於事耳今既事全是理則識即是性胡為不許立體故知識性性識俱可為體但今就賴耶迷邊無明作本立法之意既符經論不違祖誥故也若乃指性識之性為虗妄習性意或未韙何以言之以虗妄習性一向無定今奚復責無定乎此既指為虗妄則下志性無定之性亦虗妄矣既是妄性用志何為須知此性即是法性法性既為無明所覆全體屬妄故言性識豈非真如隨緣之義乎故妙玄引光明云無明體相本自不有妄想因緣和合而有不善思惟心行所造如幻師在四衢道幻作種種象馬纓珞人物等癡謂真實智知非真無明幻出六道依正當知本自不有無明所為故曰六道差別非自在等作悉從一念無明心出是故立此為體正點昔迷令成今悟了修染修惡等即是緣了佛性就路還家名不思議故知以性識為體方使六道破無明殻成法性身故吾於總示中云今且置悟秪論其迷意葢在此也第三明不思議行願為宗者準經文殊問佛云地藏菩薩因地作何行立何願而能成就不思議事又大士於過去不可說劫前身為大長者子因見師子奮迅具足萬行如來相好莊嚴因問彼佛作何行願而得此相又如來自結經名一名地藏本願一名地藏本行故知行願二法乃一經之宗要也釋願如前梵語遮梨耶此云行二法必雙立者智論問諸菩薩行業清淨自得淨報何以要須立願然後得之譬如田家得穀豈復待願答作福無願無所樹立願為導御能有所成今乃莊嚴佛界事大獨行功德不能成故要須願力譬如牛力雖能挽車要須御者能有所至淨世界願亦復如是然四教菩薩各有通別二願與樂不無上中下差別下願致今世樂因緣中願與後世樂因緣上願與涅槃樂因緣今既是開顯部教立願要心唯依最上一乘令法界眾生同得阿耨菩提發願既爾行行亦然但行相多門略舉三法則戒定慧此是出世梯隥佛法軌儀處中則六度法華云為求菩薩道者說應六波羅蜜度生死流登涅槃岸廣則萬行乃至百千萬億大論云菩薩行般若時雖知諸法一相亦能知一切法種種相今束諸法通歸一偈古德云式觀應世廣說萬行之網目緬想契理唯唱四句之綱要戒經云諸惡莫作眾善奉行自淨其意是諸佛教妙玄釋曰諸惡即七支過罪輕重非違如是等惡戒所防止諸善乃善三業若散若靜前後方便支林功德悉是清升故稱為善自淨其意者破諸邪倒了知世間出世間因果正助法門能除心垢淨諸瑕穢豈過於慧佛法曠海此三攝盡但由觀機樂欲為善不同應物隨宜示行有異辯根性分信法之殊陳行相列別圓之異今先明別行為圓之詮妙玄引涅槃明五行一聖行謂戒定慧為自行因二梵行謂慈悲喜捨為因中化他此二是地前修因行三天行謂初地已上證第一義天天然之理由理成行故名天行此行在於地住四嬰兒行謂示同三乘七方便所修之行五病行謂示同九界三障身相此二皆是從果起應之行同生善邊名嬰兒行從大慈根起同煩惱邊名為病行從大悲根起今地藏大士見諸眾生破戒造罪失人天樂及涅槃樂即是知集往來生死受惡道報即是知苦苦集與戒定慧相違即無道無道故不得涅槃則無滅菩薩欲拔苦集而起大悲興兩誓願欲與道滅而起大慈興兩誓願發誓願已次則修行三學六度若干願行成就眾生淨佛國土然行名進趣非智不前智解導行非境不正智目行足到清涼池而解是行本行能成智故行滿而智圓智能顯理理窮則智息如此相須則非妙行今大士直達修惡即是性惡性惡融通任運攝得佛界性善照一切罪相無非實相十惡五逆四重八邪皆理毒之法門悉性染之本用以此妙行教化羣生解此性識為所照所顯之境體用此智行為能照能顯之妙宗初緣實相造境即中無不真實己界及佛界眾生界亦然陰入皆如無苦可捨無明塵勞即是菩提無集可斷邊邪皆中正無道可修生死即涅槃無滅可證純一實相更無別法此即復有一行名如來行一行一切行也如是以智照境以境發智觀業實相見罪本源法性無明相融相泯豈非能觀皆一心三觀所觀皆三諦一境一而論三三而論一境智行三同名秘藏如天王三目如伊字三點若一若三皆無缺減則體為宗家之體宗為體家之宗故以不思議行願為宗也第四論不思議方便用者準經佛告地藏菩薩云吾於五濁惡世教化剛強眾生令心調伏分身千百億廣設方便又告四天王云如是菩薩於娑婆世界閻浮提中百千萬億方便而為教化又告地藏汝須百千方便勸是等人又云菩薩以方便力拔出根本業緣又菩薩方便力故使令解脫地藏自云我亦百千方便度脫是人等故以方便為今經之用也梵語漚和俱舍羅此翻方便吾祖智者以三意釋之一曰方者法也便者用也巧用諸法隨機利物二曰方便者門也門名能通通於所通方便權略為真實作門真實得顯功由方便三曰方者秘也便者妙也妙達於方即是真秘前二釋竝非今品意後一釋正是今品之意文亦可具足用彼三意例如維摩所說方等初開故荊溪作進退之釋容與取門祕之談今地藏亦然雖主祕妙之談必兼門法之說三釋咸具庶括一經大意何以言之良由地藏大士於塵點劫前現身教化隨機巧逗法用偏宜顯實時臻權門可入發菩提心於賴耶識內點如來藏於無明心中斯正妙達於方即是法華真祕又復一毛一渧一沙一塵我漸度脫使獲大利與法華舉手低頭聚沙為塔咸開小善成佛奚差況乃天宮集眾及所合分身數逾恒沙文殊罔測已成佛道者何殊樹下分身尚住菩薩者宛似地中涌出故須三釋通收則知大士出假利生以發菩提心為因無緣大悲為根無得方便為究竟利生若無方便如救溺無舟彼既難出自或淪胥若有方便如乘船援溺彼此得濟老幼偕愉終日與拔如寶月行空而無住億劫度人似鴈影過水而不留更以異方便助顯第一義用有成宗之功宗有顯用之力故知方便正慈悲與拔之妙用故以不思議方便為力用也第五判無上醍醐為教相者凡言教者是通途之言但有指撝分判辯說皆名為教四教義云通言教者以詮理化物為義說能詮理化轉物心故言教也化轉有三義一轉惡為善二轉迷成解三轉凡成聖今地藏大士現身六道於四不可說用四悉檀赴緣隨機說教化轉物心大槩不越此三故約此以判教相也問大師用華嚴三照義開平地為三復取涅槃五味以對華嚴三照兩經二義相成以判一代聖教共列五時一華嚴時約經立名二鹿苑時約處立名三方等時約法立名四般若時五法華涅槃時俱約經立名前後四時判味有定不屬前後所攝者皆收歸方等如光明勝鬘大集楞嚴等是其例也今地藏本願經亦合第三方等時攝云何判歸醍醐耶答此有據按統紀師云五十三年壬申指周穆王佛先往忉利天三月安居遣文殊詣母所暫屈禮敬三寶摩耶夫人聞之乳自流出直至佛口即與文殊俱至佛所佛為說法得須陀洹果三月將盡欲出涅槃帝釋作三道寶階佛與母別大眾導從下還祗洹此出佛升忉利經東湖述曰案行法經却後三月我當涅槃則知說行法在辛未十一月望案升忉利經三月安居則知說行法畢即日往忉利案此經三月將盡欲入涅槃乃是此年二月十四日下閻浮提十五日入涅槃故涅槃經云二月十五日將入涅槃今經乃是佛在忉利天為母說法時眾集現瑞分身地藏來集而說故此經的在法華經後涅槃經前明矣不屬醍醐待收何味問約時收經殊為有據然觀經文前後略無開顯之辭何可同二經時味耶答法華大收涅槃捃拾所應記者皆已記訖佛今上升忉利為三事故一為母說法所以報鞠育之恩酬劬勞之德將以勵後世無恩之人也二為慰別天神所以報一期擁護併囑末世比丘託令衛之無魔事也三為六道辛苦求出無期付囑地藏教護以待彌勒下生正顯我佛慈悲臻後劫也何必更有顯決之文方許判屬醍醐當以像法決疑行法經等例觀則羣疑自息矣問孤山判楞嚴入醍醐準彼聞妙蓮華同佛知見之說似有憑據何故東湖非之曰一化終窮在乎開顯開顯之妙功歸法華自餘諸經有圓說者皆方等四教談圓之義而孤山乃欲以楞嚴同法華醍醐之味是不思方等收經而有失法華淳一無雜之旨今觀地藏隨機說法允屬方等四教並談今判類彼得無有孤山之失乎答楞嚴一經賓主徵辯心見之文的是方等彈斥之餘後明三科七大宛合般若蕩相之說聞妙蓮華之語允屬法華之後此乃通五時中通後之義豈得判同法華東湖駁之文義俱當今地藏一經天宮一時之說隨機開導乃騰其本昔之詞例同法華騰昔施權那同孤山淳雜之失乎若爾長阿含遊行經中亦言如來不久是後三月當般泥洹及涅槃後事胡不判同醍醐耶曰此不可例藏圓逈別故況阿含中明涅槃後事者此通五時中文通之類可以收歸本部者今經絕無二通之意那可據彼以難此耶故知今經定以開顯無上醍醐為教相也然皆言不思議者準本經所說此菩薩威神誓願智慧辯才種種方便皆不可思議故今名體宗用一一稱性皆依不思議而立也二總示觀法者山家立法有教有觀焉教以開解觀以起行如膏明相賴目足交資則於四門入清涼池矣後代傳其教者詎可徒守文言而不明觀行乎單輪隻翼烏能遠運故今略述大途以見經不徒說而同歸於秘密藏中也教有藏通別圓前三為權為麤後一為實為妙今經開圓常正信妙實之解以權為所開之麤實乃能開之妙正所以簡三麤顯一妙也觀有析體次與不次如次以對四教前三為可思議後一為不思議所以具列者欲簡思議以顯不思議也具如止觀云云今經既在法華後說唯明純圓妙解以起叵思妙行則與止觀十章以前六章開解後四章起行同也故以觀眾生業緣業感等文即空假中以顯地藏不思議事則能觀無非一心三觀所觀無非三諦一境矣義例云夫三觀者義唯三種一者從行唯於萬境觀一心萬境雖殊妙觀理等如觀陰等即其意也二約法相如觀四諦五行之文入一念心以為圓觀三託事相如王舍耆闍名從事立借事為觀以導執情即如方等普賢其例可識詳解云三種觀法義蘊經疏天台依諸大乘經立四種三昧修十乘觀法直就陰心顯三千法即從行觀義又依諸經於言句約事相法入心成觀托事謂心為能托依正事為所托附法謂心為能附諸法門為所附即事法二觀之義荊溪者覈其義立三種名云云縱明事相觀亦只助成約行觀耳今準彼文略明三義若觀今經性識本如來藏一念具足十界百界三千性相此如止觀簡去界入唯觀五陰重擔就此五陰先簡色法次簡受想行三心所法唯觀六識心王故云一念以前五識必依第六意識同時而起方能取境造善惡業楞嚴云六為賊媒自劫家寶意根賊之渠魁也功力甚大以第七識為所依根與前五根相應和合造諸善惡之業皆納第八識中如倉庫盛物隨時出內第七識常時執取第八見分為內自我我癡我見我慢我愛四惑常俱故名染污識染污真性故遂使第八識立含藏賴耶之名彰無明迷中之號今觀無明體相本自不有妄想因緣和合而有因緣體虗諸法相妄中論云因緣所生法我說即是空亦名為假名亦名中道義四明云初約行者直就一念觀於十界百界千如妙法雖即一念千法宛然全體即空當處即假仍非二邊又即雙照不可以一多說安以有無思若邊若中皆莫能擬於斯觀行位中既深進入則六七識不執於我得分別我法二空轉成無漏則見思染污麤垢先落從是進觀教化眾生成不思議妙假破塵沙無知進破無明俱生我法永不起得成無生忍無功用道任運流入即捨賴耶之號別受清淨之名然破惑顯性功由六識四明指為近而復要為事理解行之本如伐樹得根灸病得穴此即十乘中初觀不思議境名從行觀也若夫托事附法即托總題地藏本願人法而觀之今先觀菩薩人者以行人瞻禮地藏之際供養華香之時不表觀法何以用心今準佛說八大菩薩曼陀羅經云於如來前觀地藏菩薩頭冠瓔珞面貌熈怡寂然愍念一切有情左手安齋下托鉢右手復合掌向下大指捻頭指作慰安一切眾生想釋曰頭即一切種智冠即毗盧法性瓔珞梵名吉由羅或枳由邏表總持四陀羅尼一法二義三呪術四忍以表種智從法性而成故能總持一切法門也面貌熈怡表從心所現慈悲相好葢一身之相以面為要諸法所依以心為體相逐心生故以表心寂然等者表菩薩自住三摩地六道以苦緣而感菩薩以大悲而應也左右二手表權實二智實智內自照理權智外以鑒機齋下托鉢表性識所具如來藏也內空外圓表自他同具空如來藏圓同大虗無缺減也內可藏物表不空如來藏具足河沙性功德也大指捻頭指者表迷悟一如因果相合而慰安六道眾生勿憂惱也次觀本願法者占察經云若欲依一實境界修信解者應學習二種觀道一唯心識觀二真如實觀唯心識觀者謂於一切時一切處隨身口意所有作業悉皆觀察知唯是心隨一切境界隨心有所緣念還當使心隨逐彼念令心自知知己內心自生想念非一切境界有念有分別也而一切境界未曾有想起於分別一切法唯心想生若使離心則無一法一相而能自見有差別也知唯妄念無實境界勿令休廢是名修習唯心識觀真如實觀者思惟心性無生無滅不住見聞覺知永離一切分別之想漸漸能過四空等境界相得相似空三昧得此三昧識想受行能分別相不現在前從此修學為善知識大慈悲者守護長養離諸障礙勤修不廢能入心寂三昧復能入一行三昧入一行三昧已見佛無數發深廣心住堅信位於奢摩他毗婆舍那二種觀道決定信解隨所修學諸禪三昧之業無所樂著乃至遍修一切善根菩提分法於生死中無所怯畏不樂二乘以依能習向二觀心最妙巧便眾智所依行根本故文據此二觀與今家三種觀法無少差忒托事附法與從行之事觀擬同唯心識觀從行中之理觀擬同真如實觀此是地藏自修之法復令一切修之觀惑業苦三障皆此心似境都如幻化更何有生死流轉止觀云發大心勸昏倒眾生醒悟上求下化修大行勸牢強精進止惡行善感大果感生梵天妙報悅心裂大網經論開人眼目融通解結出籠歸大處法界雖無始終通塞豁然大朗無礙自在此即地藏本願之法也如此人法竝在一念介爾之心即空即假即中吾心既爾生佛亦然但眾生太廣佛法太高初心為難但觀己心之高廣以扣無窮之聖應機成致感逮得大利故須觀心也觀音玄云摩訶衍中始從初心終於後心常觀人法俱空以觀人空即是了因種子觀法空即是緣因種子故論云始覺人空終覺法空以觀人法空即識三種佛性佛從初發心觀人法空修三佛性歷六即位成六即人法今觀地藏即是分證等覺之人法行人能觀人法全是自心如如意珠無不具足即空假中始從觀行而至分證與地藏本願一而二二而一者矣故曰不表觀法何以用心此托事附法觀之大途也總題既爾別文亦然始從如是終至而退中間若人法若識心若善惡若凡聖淨穢因果香華飲食種種差別法門莫不入心成觀如破一微塵出大千經卷故於聽聞讀誦禮拜供養心不他緣從心顯發方名全性起修全修在性則免貧人數寶之誚矣故於文前點出以見立教正為觀心詳如一家大小諸部若欲修習須近善師涅槃妙因在此而已矣三別解經文者此經分三卷或作上下二卷總實叉譯共十三品今先通釋品題次乃隨文演義初釋忉利天宮神通品即序分也今不標序品之名而直題忉利天宮神通品者夫序有三次序序由序述經前五事次第安立次序也佛昇忉利為母說法諸佛菩薩如雲而集潛欲發起地藏教化因緣故如來含笑放光光雲出音復集天龍鬼神等眾顯發地藏度脫因緣皆敘由也如來與文殊問答眾數及騰昔地藏度母因緣乃序述也故但名神通品忉利正言多羅夜登陵舍此翻三十三淨名疏云若此間帝釋是昔迦葉佛滅後有一女人發心修塔復有三十二人發心助修修塔功德為忉利天主其助修者作輔臣君臣合之名三十三天即正法念經所列帝釋中住善法堂天四峯三十二天所謂住峯天等梵語提婆此云天天然自然樂勝身勝故宮者穹也屋見於垣上穹隆然也上穹下合人居其中从宀音綿交覆深屋也象覆幬其下二口象別內外界限立世阿毗曇云忉利天善見城周圍四萬十千由旬純金為城城之四面為千門樓中央金城帝釋住處凡五百門種種寶莊不可具述是城中央寶樓重閣名皮禪延多樓長五百由旬廣二百五十由旬云云皮禪延多重閣最上當中央圓室廣三十由旬周圍九十由旬高四十五由旬是帝釋所住處竝是琉璃所成眾寶廁填如來升坐於此為聖后說法乘時現通之處也神通有通別二意易曰陰陽不測之謂神寂然不動感而遂通天地與道為體也其妙用曰神此依俗釋今準纓絡經云神名天心通名慧性天然之慧徹照無礙故名神通通有六種一如意二天眼三天耳四他心五識宿命通六無漏通今指含笑放光諸天同集皆如來不思議慧性之妙用故名神通梵名䟦渠此云品義類同者聚在一段故名為品亦通名也或佛自唱或結集所置或譯人添足今觀分品之法大似譯師自立諸品之始故云第一准佛昇忉利說法經在歡喜園圓生樹下三月安居四眾圍繞緣由既起正事宜彰地藏分身乘時集會其事無非皆為地藏故居正宗之首身者人之區宇也各一乾坤中象其心身之主宰也然吾人由業所感因茲合會託三緣而賦質摶四大以成形斯乃諸惡之源眾苦之本菩薩之身從無量功德生由中道業識現相好光明即法身也分者施也別也如海一源施開萬派如天一月影現百川也集者同也聚也如天日將瞑眾鳥同歸聚集樹木之上而棲息也會者總也合也周禮云時見曰會葢佛日將沒大地欲暗菩薩鳥王率眾同歸棲息之所總合而會見也原其分散則從體起用從本垂迹集會則攝用歸體攝迹會本也方其分散則一為無量在今集會則無量為一一為無量則一不為一無量為一則多不為多一多無礙舒卷自由威德神通不可思議感應道交賓主嘉會者矣故曰分身集會品第二地藏分身既集如來摩頂告言以己累劫分身之勤苦慰彼末世拔濟之因緣憶念付囑天宮合身受教待遇彌勒授記盡命護持良由法界六道眾生因惑業苦三道洄旋致獄鬼畜三塗流轉然眾生受苦之處正菩薩攝化之門故下業緣業感獄名三品為同體慈悲之要道作幽冥教主之良緣故云眾生乃成佛道之增上緣豈虗語哉維摩云諸佛解脫當於眾生心行中求斯之謂也又此三障互相由藉因惑造業由業招苦是以三品鱗次而來也今先釋觀眾生業緣品梵名僕呼繕那此云眾生法華文句準中阿含有三釋劫初光音天下生世間無男女尊卑眾共生世故言眾生此據最初也若攬眾陰而有假名眾生此據一期受報也若言處處受生故名眾生者此據五道流轉也業者作動名業妙玄云搆造經營運動三業建創諸惡名之為作剋實而論體即是思動身之思發語之思及思當體三皆言業故知身等非即是業動身等思方名為業緣者互相由藉之名而其親能生起之因實無明顛倒心耳因心起業因業受身身還造業以受形形復從心而作業昇沉隨業苦樂從心若影之隨形曲申響之隨聲大小而無毫微差忒者也故佛告長爪梵志云世由自業業為能授業為生處業為親族業為所依大經云如木有火遇緣即發則知現世苦樂由先世業業由貪嗔無明故曰眾生業緣也然有通別通則十界苦樂別則三塗劇苦皆是菩薩所觀之境其能觀者乃菩薩三觀之智先明通觀總不離自心如光明疏云諦觀一念心即空即假即中即是三身何者華嚴云心如工畵師造種種五陰若心緣破戒事即地獄身緣無慚愧憍慢恚怒等即畜生身緣諂曲名聞即餓鬼身緣嫉妬諍競即修羅身緣五戒防五惡即人身緣十善防十惡緣禪定防散亂即天身緣無常苦空空無相願即二椉身緣慈悲六度即菩薩身緣真如實相即佛身十法界身皆由心造以故須觀緣起也若別觀三塗地獄眾生登刀上劍摧折色心餓鬼吞銅噉銕飲血食膿畜生魚鱗相咀挽重牽車慈眼既觀悲心即救既惟心造無性緣生緣生之性本空十界之業何有故華嚴四十八云菩薩知諸業不從四維上下來而共積集止住於心但從顛倒生無有住處菩薩如是決定明見無有疑惑種種諸業而實無我無有我所六趣果報十方推求悉不可得隨有修集則受其報譬如幻師幻惑人眼汝等昔在地獄及身非十方來但由於汝顛倒惡業愚癡纏縛生地獄身此無根本無有來處既觀一陰空無所有則令十界皆不可得妙玄云觀身由心心由緣起生滅迅速不見住處相貌但有名字名字亦空故須觀眾生業緣也上品明因惑造業此品明由業感果形端則影直源濁則流昏感應之道不爽毫末閻浮具足應云閻浮提此翻勝金閻浮樹名提洲名此洲之上有此樹林林中有河底有金沙名閻浮檀金以閻浮樹故名為閻浮洲有五百小洲圍繞通名閻浮提西域記云南贍部洲以此土無相當故不翻唯記音義中翻為穢樹而義無出今準長水曰閻浮果汁點物成金因流入河染石為金是取果汁點染為穢之嘉稱不可秋深葉落污池之惡名也余考立世阿毗曇云昔王舍城有兩比丘具神通力共為朋友往看彼樹遂至樹所見樹果熟墮地而破其一比丘從其蒂孔授手至中其最長指猶不至核牽手而出為果汁所染手甲皆赤時有一人名曰長脛行至樹邊取一果子還奉世尊佛受此果破為多片施諸大眾果汁染於佛手佛以此手擊於巖至今赤色如昔不異濕亦不燥掌迹分明因昔分果為片片故因名此石為片片巖此文足證點染為穢之旨感者天機觸動也从心从咸交相感也人與天地萬物同體非兩何以為感非一何以能感感生於寂故曰寂然不動感而遂通則主寂而感客學者當立其天根又从心咸內者何咸皆也皆心之所動而感也起信云不知真如法一故不覺心動動則有苦果不離因故南嶽云隨緣不變名性不變隨緣名心豈非心動而感乎經云一切眾生未解脫者性識無定為善為惡逐境而生是也若通論十界眾生俱為業感止觀云業有三種謂漏業六凡無漏業二乘非漏非無漏業菩薩感於三土謂分段方便實報報由三種煩惱謂取相塵沙無明據此則如來三惑已斷無漏清淨慧業感生寂光土矣拾遺記云今家妙解華嚴心造乃有二義一者理造造即是具二者事造通於三世造於十界謂過造於現過現造當現造於現皆由理具方有事造故十界身一一皆是全性起修雖全是修而因成感果無少差忒故十界身皆有假實及以依報無有一物從空而起經云未見他作我受我作他受乃自作自受耳故佛告首迦長者云一切眾生繫屬於業依止於業隨自業轉以是因緣有上中下差別是也問業感既通十界何故獨標閻浮眾生答菩薩必定十身利生四土攝物今獨言閻浮者以此眾生易造感極苦之業故大士悲心偏向之何以明之餘國土中或純是菩薩或三乘共居即凡聖同住或造業輕微惟有娑婆凡十方國土之所不攝惡逆眾生皆托生此土又一一四天下而不言餘三者如長阿含云東弗婆提人多欲者一生數至六七亦有修行至死無欲西洲造業甚少北洲聖人不生唯南洲人舉心動念無非是罪脫獲善利多退初心若遇惡緣念念增益故特標之益見地藏大聖以平等慈分身沙界而悲心偏向南洲有情故云閻浮眾生業感品第四上論業感通論十界別論六道就六道論三善苦樂相間三惡純苦無樂即於三塗鬼畜之苦稍輕地獄之苦最劇本經云罪苦之事不忍稱說百千歲中卒白難竟故普賢既聞業感之品輒問地獄之名意有在也立世阿毗曇論云地獄梵名泥黎耶正音那落迦或捺落迦此云無有新婆沙論云彼諸有情無悅無愛無味無利無喜樂故舊婆沙名不自在謂彼罪人為獄卒阿傍之所拘制不得自在故此皆約正報義翻也地獄之處依本經在三海之內準新婆沙在此贍部洲下妙玄云此正地獄在地下二萬由旬其傍地獄或在地上或在銕圍山間今從多為言名地獄耳婆沙又云南洲有正有邊東西二洲唯邊無正北洲邊正俱無三洲人若造重罪皆來南洲正獄及東西兩洲邊獄受苦以正重而邊輕也名號者地獄之聲稱名自命也命物也昔者黃帝正名百物因其固然名正而百物止止从夕从口何也周禮大司馬掌名號以辯軍之夜事雖暗中亦可相別也號者上之徵令以布大信其猶天地之風乎不如是則無以鼓舞羣動矣亦為命物之共名合異以為同者也旨哉自命之言乎閻羅王告罪人云汝自作惡非是父母君天沙門道人過也罪自由汝不得以不樂故止今當受之則地獄之名皆自作而自命也妙哉徵令布信之言乎若閻王不立地獄之號何以警誡罪人纖毫不爽鼓舞改惡從善也雖各循私造業一等墮獄無差合異為同均名地獄矣然从言从犬何訟者如二犬爭吠此亡身之地亦迴心之地也嗚呼人間一人繫獄便令九族愴惶地獄六親墮落聞者略不怵惕累我地藏慈尊劫劫救拔獄獄彌增普賢發問請說見大行之不休示悲心之靡間此問地獄名號之深意也上自業緣業感以及此品名為三道亦名三障所以明此者欲開三道三障為三德耳如止觀問三障及三道皆障三德三障開通至極三道亦應開通至極答例葢事中惑起於業業感於苦苦還起惑此三修惡即是性三性指三障是故具三修從性成成三法耳是故三道修惡與性三惡融通任運攝得佛界三德性善故大師云當知三道體之即真常樂我淨與三德無二無別所以苦道即法身煩惱即般若結業即解脫舉此三品正欲通開久遠四惡麤智人天世智別開的在地獄色心假實若不開之則佛之知見永埋四趣長沒人天三品邐迤而起一道開顯已成故地藏威神之力不可思議也上文業緣等三品已開三道成三德皆地藏不思議威神之力故如來於人天大眾之前特申讚嘆一顯地藏無數劫來慈悲神力二勸未來眾生供養得福故有此品之來也梵語多陀阿伽陀或怛闥阿竭秦言如來如來假名也名必召實而有法報化三身不同金剛經云無所從來亦無所去故名如來者此指法身也若第一義諦名如正覺名來名如來者此指報身也若云乘如實道來成正覺名如來者此指應身也今夫天宮讚歎之佛應指何身須知經在法華之後則天宮大眾竝是圓機皆以業識見相住中道實理即此色應便為尊特當同龍女所謂微妙淨法身具相三十二相相如海不須現起方名尊特即釋迦境本定身而是圓實部主之真身也讚者稱美之詞乃從文以結章歎者咨嗟之意乃隨聲而歌詠地藏大士威德無窮慈悲甚大讚不足以盡其蘊故復加之乎歎也問佛何以不讚歎地藏六度功德而獨讚歎威神慈悲之力乎答如大論云眾生有二種一者樂善法二者樂善法果報為樂善法者讚歎諸功德為樂善法果報者讚歎大神力正與今經意同故名如來讚歎品第六前品既讚歎威神之力今明利益存亡以顯其實古聖云駕之於空言不如見之於實事今明利益存亡者乃見之於實事也利者自私也物各自遂則易以私古人嚴為之禁从物古制字轉注以刀求利則害至矣益者進也衡水於皿上適充其量而止虗則尚可受滿則不可復容故又為泛益之益別加水作溢非存者在也獨取於子者彰父母之憂勤也从才取意也父母生子常恐未知存亡幸而不短折至於成才而後喜可知也亡者失之也存取諸子亡本諸親孝子親死既殯猶若臥然既塟反而求之弗得若其入於乚隱字然乃祭以求之事亡如存猶望其親去而復還也此依俗釋若妙玄云功德利益一而無異若分別者自益名功德益他名利益今地藏菩薩自勸諸人當為病人修福念佛慎勿殺害拜祭鬼神與大辯長者發明在生沒後誦經獻齋因緣皆不為自身惟為存亡眾生故唯稱利益明此利益有三一遠益如天宮所集之眾自諸佛菩薩已熟脫者種種天龍八部久種熟未脫者是二近益自地藏於賢劫拘留孫至釋迦四佛以來有種有熟有脫皆來天宮聞法者是三當文益即聞品後千萬億那由他閻浮鬼神悉發無量菩提心及前後聞法獲益者是今經既同法華亦應準妙玄略為七益廣開十益但自古及今論開顯一化高功獨尚法華涅槃尚劣豈得以天宮付囑之圓說竝靈山開顯之極談三益收機其義自足故明利益存亡品第七閻王品列在後者有二意一者始自分身地藏升忉利天時王與鬼眾隨從同到不預集眾之列者葢賓主酬酢事迹相連未暇出名故於此品承便示之二者既聞地藏威神之力又見如來讚嘆功德潛思大士行化幽冥吾為檀主安可不乘時問明劫劫度生救苦之事一申讚嘆乎故有閻羅王眾讚嘆品第八之來也閻羅具足云閻磨羅或夜磨盧迦此翻雙世鬼官之總司亦云閻魔羅社此云雙王兄妹皆作地獄主兄治男事妹治女事又苦樂竝受故云雙也若云閻羅𦦨魔聲之轉也乃鬼趣所收或地獄趣攝準淨度三昧經昔為毗沙國王與維陀如生王共戰兵力不敵因立誓願為地獄主臣佐十八人領百萬之眾頭有角耳皆悉忿懟因立誓曰後當奉助治此罪人毗沙王者今閻羅王是十八大臣者今諸小王是百萬之眾諸阿傍是長阿含經云閻浮提南有金剛山內有閻羅王宮縱廣六千由旬問地獄經云住獄間城縱廣三萬里金銀所成晝夜三時有大銅鑊自然在前若鑊入宮內王見怖畏捨出宮外若鑊出宮外王入宮內有大獄卒臥王熱銕上銕鈎擗口洋銅灌之從咽徹下無不焦爛事竟還與采女共相娛樂彼諸大臣同受福者亦復如是是則閻王與眾臣佐皆欲脫冥界之苦故申讚嘆而發菩提心也此據實位感生若準下文主命鬼王本迹則閻王與眾皆是不思議菩薩住王三昧應現其中度脫地獄眾生不然何能預天宮之會懷疑決問而申讚嘆耶前來諸品或發明六道差別之相或讚嘆地藏威神之力或廣明利益存亡之輩若不明出苦成佛之因則初地藏救拔之心期與眾生同成佛果之願未滿欲成佛果必須稱佛故有稱佛名號品之來也梵語佛陀秦翻知者一切諸法了了覺知故漢言覺者自覺覺他覺行圓滿故葢對迷名知對愚說覺耳肇法師云佛者何也窮理盡性大覺之稱也夫生死長寢莫能自覺自覺覺彼者其唯佛乎召體曰名表德曰號則名別號通一切諸佛皆具十號響頒人天若言名無得物之功物無當名之實此指世間因緣之法名物皆妄兩不相到故云然耳今夫諸佛名號名實皆真故纔舉鴻名萬德全備一稱嘉號眾罪齊消然念佛與稱佛略有不同念佛大槩約觀心成念佛三昧大師立四種三昧通名念佛念是能觀妙觀佛是所觀妙境禪祕要法經有禪難提阿羅漢問滅罪法佛告禪難提及勅阿難汝等當教未來眾生罪業多者為除罪故教使念佛以念佛故除諸業障報障煩惱障念佛者當先端坐叉手閉目舉舌向腭一心繫念心心相注使不分散心既定已先當觀像云云佛又云佛滅度後若眾生欲滅罪者佛雖不在繫念諦觀形像者諸惡罪業速得清淨故寶王論曰浴大海者已用於百川念佛名者必成於三昧亦猶清珠下於濁水濁水不得不清佛想投於亂心亂心不得不佛既契之後心佛雙亡則萬緣萬境無非三昧矣稱佛如小彌陀經云聞說阿彌陀佛執持名號若一日二日乃至七日一心不亂等慈雲懺主云言念佛者或但稱名號執持不散亦於現身而得見佛此間現見多是稱佛名號為上如懷感法師一向稱阿彌陀佛名號而得三昧現前見佛故今普示稱佛之法必須制心不令散亂念念相續繫緣名號口中聲聲喚佛心內字字分明若百聲千聲萬聲若一日二日乃至七日並須一心一意心口相續如此方得一念滅八十億劫生死之罪若不然者滅罪良難大師釋一心稱名有事有理若用心存念不間名事一心若達此心四種不生自他共離四種性計與空慧相應四性既離即知無生是理一心是則念佛稱佛分而不分矣故曰法無定體神而明之存乎其人也但此經別立諸佛之名諸經皆讚阿彌陀佛以一身一智慧力無畏亦然若專念阿彌陀佛即與稱諸佛等亦隨人所樂豈可局定良由諸佛名號皆是萬行萬德所成若念若稱或事或理盡脫苦輪同生淨土者矣故云稱佛名號品第九稱佛名號固為成佛根本若無福助則根不深本不大安望其開華結果耶故明較量布施功德以明緣助也較者不等也量者寬虗容物也凡量皆受法於黃鐘之容六律黃鍾十一月釋名曰鍾空也空內受氣多故聲大白虎通曰鍾之為言動也陰氣用事萬物動成實以子穀秬黍是生龠音藥合升斗斛所以量多少也本起黃鐘之龠以井水準其槩孟康曰槩欲其直故以水平之井水清清明平也合龠為合音閤十合為升十升為斗十斗為斛而五量嘉矣量多少者不失圭撮圭自然之形陰陽之始四圭曰撮三指撮之也然布施乃出世之福福德即非福德是名福德奚事錙銖較量為當知菩薩摩訶薩明鑒在會之眾因是而有四悉檀益以大悲心教修福行福行初門先行布施菩薩行般若波羅蜜智慧明利能分別施福施福雖同福德多少隨心優劣故須較量也布散也爾雅云祭星曰布謂散食於地取其象之布也施惠也與也凡設施之施平聲施與之施去聲但有二三之名不同二即財施法施財謂飲食衣服乃至妻子身命有所須者悉皆施與皆名財施法即世間出世間種種善法以清淨心為人演說皆名法施三即資生無畏法資生施即上財施無畏施者持戒不惱無冤忍辱不報有冤故無畏法施者精進不倦說法禪定不差機說法智慧不顛倒說法與上法施同然此三施體通六度若立檀那餘度俱攝彌勒般若偈云檀義攝於六資生無畏法此中一二三名為修行住資生即一無畏有二法施有三故佛道行門雖多而布施攝盡布施皆有破六蔽之功證三德之德故言布施功德緣即因緣生起助成之意謂內有信心外有福田中有財物三事和合心生捨法能破慳貪是為檀那若三事缺一施不成就故須藉緣若得緣行施福無量矣所以較量者如地藏白佛言我觀業道眾生較量布施有輕有重有一生十生受福有百生千生受大福利故須較量一約福田較量二約施心較量約田如須達經及四十二章經等皆言施與閻浮提凡夫人寧施與彼仙人得福多雖施仙人不如施一須陀洹乃至雖與百辟支佛不如施與如來此常福多大論云布施之福在於福田如億耳阿羅漢昔以一華施於佛塔九十一劫人天中受樂餘福德力得阿羅漢以施田妙故得大果報當知大福從良田生約心者論云布施有二種一者淨二者不淨不淨者直施而已或為失財故與或親愛故與或不一心不恭敬輕賤受者與淨相違名為不淨淨施者治心故施莊嚴意故施為得第一利故施生清淨心能分別為助涅槃故施譬如新華未萎色好且香淨心布施亦復如是如舍利弗以一鉢飯上佛佛即迴施狗問舍利弗汝以飯施我我以飯施狗誰得福多舍利弗言佛施狗得福多以是故知大福從心不在田也以心為田主田是外事故良田雖得福多而不如心有如是差別故須較量大要了四相之原空達三輪之本寂體財即法無住生心是布施第一義門故明較量布施功德緣品第十較量施福助成佛道則地藏本願大意昭明付囑已竟大士承領則一經正宗之大事已訖此下三品皆為流通此經也而地神首為護法者南閻浮提是其所主故率先護之使後世修行無障在在宣通也今先明有地之由次釋地神之義抱朴子云大極初搆清濁始分故天先成而地後定魏子才釋之曰大氣之質也人有恒言曰混沌初分其輕清者為天而重濁者為地未知其本無二也今夫天通宇宙全體是其周身也氣無厓而形有厓故人身外裹而心中虗天之大氣包運無外而形質結於中央成地萬物非此無以生養因而稱乾父坤母實則天地一身也此儒家之精義也然未知天地之原誠中眾生業感乎楞嚴云覺明空昧相待成搖故有風輪執持世界因空生搖堅明立礙彼金寶者明覺立堅故有金輪保持國土堅覺覺成搖明風出風金相摩故有火光為變化性寶明生潤火光上蒸故有水輪含十方界乃至交妄發生遞相為種以是因緣世界相續是也既有其地必有主地之神神以主宰為義得天之陽氣而靈通者然地神頗多若主南閻浮提名堅牢地神若約法門明之前四天王於正說中發問乃住善權道為眾生法父此地神於流通讚勸住善實智道為眾生法母以天王是陽故如父地神是陰故如母此約世界悉檀釋也譬如陰陽覆載卉木智度養育出生眾善此約為人悉檀釋也餘度各有所主實智照了無相無名此約對治破惡悉檀釋也餘度有等有上智度無等無上是究竟度此約第一義悉檀釋也以具四悉檀義故能為神主閻浮提而護本願法門故言地神護法品第十一前品護法端為流通若見若聞皆霑利益目光所照曰見見屬於眼自耳通心曰聞聞屬於耳以心之致用在耳目未有耳目陿而心廣者从人从目主之者心也使其形者也聞从耳从門者此教人開廣胸襟闢其四門用天下之耳為吾耳廓然天下一家矣此雖俗釋而與吾道懸會若吾人於見色聞聲之際了知一一皆心心尚叵得見聞何有即此見聞非見聞矣於無見中見如來種種輪光於無聞中聞地藏不思議事即此見聞非空非假而空而假雙照雙遮絕思絕議由此見聞之際即於聲色之間或圓伏五住而位登五品或先落二垢而得淨六根或頓破無明而開佛知見或無明斷盡而頓圓佛果如此似益真益因益果益前利後利淺利深利竝從見聞而修而證故云見聞利益品第十二前來地神護法見聞利益皆為流通此經流通之要專為六道眾生故於法席將終以人天之眾囑累地藏菩薩救群迷於末世待彌勒於當來此是復宗之意何以故前集地藏分身端為末劫眾生今如來將下天宮入滅復以人天付囑故有囑累人天之品準法華文句有三釋一云囑是佛所付囑累是煩爾宣傳此從聖旨得名二云囑是頂受所囑累是甘而弗勞此從菩薩敬順得名三云囑是如來金口所囑累是菩薩丹心頂荷此從授受合論具此三意故名囑累此經如來摩頂付囑地藏互跪承任亦具此三意故名囑累人天品第十三釋天如前人者梵名摩㝹賖此云意昔頂生王初化諸有所作當善思惟善籌量善憶念即如王教諸有所作先思量憶念故名人為意又訓為忍於世違順人能安忍故也然十方世界人天集忉利天宮多若河沙焉能悉舉今就娑婆一剎言之如婆沙說天有三十二種欲界有十色界有十八無色界有四合有三十二天也欲界十者一名於手天有言堅首二名持華鬘天三名常放逸天亦名恒憍四名日月星宿天五名四天王天餘如經列色界十八天亦如經列無色四天者一空處二識處三無所有處四非非想處人數尤多殊難具述若約方言之即有四天下人若以住處言之合有四千八處則有四千八種之人若直按閻浮提一方言之如樓炭經說總有三十六大國人亦同之別有二千五百小國人亦同之又一一國中種類若干漢羌蠻楚越各隨方土色類不同又閻浮提種類差別合有六千四百種人今但舉閻浮提人者乃我佛悲心偏向以南閻浮提眾生志性無定習惡者多縱發善心須臾即退以是之故殷勤以天人眾付囑於地藏也又獨舉人天而不及四惡趣者何良由人天受化易四惡受化難法華文句引經云頗有發願令五道同日成佛不佛言不可以非器之身成無上道要先化三趣令得人天然後乃可如願三趣非善道何能成佛如人求寶聚不於空中求是以佛佛皆云我於天人眾中得菩提轉法輪入涅槃也先人後天者抑又何也大論二十四云若善男子能行是深般若波羅蜜者當知是人人道中來所以者何三惡道中罪苦多故不得行深般若欲界諸天著淨妙五欲心則狂惑故不能行色界天等深著禪定味故不能行無色界天無形故故不能行故圓覺略疏裴休序云嗚呼生靈之所以往來者六道也鬼神沉幽愁之苦鳥獸懷獝狘之悲修羅方瞋諸天正樂可以整心慮趣菩提唯人道為能耳故先人後天其四惡趣倘蒙利益即生人天亦在付囑之內非謂秪付人天也問大論云佛已斷法愛乃至一切種智涅槃不著不取相今何以殷勤囑累人天似如愛著耶答諸佛大慈悲心從初發意乃至到涅槃門常不捨離於娑羅雙樹間猶以金剛三昧為眾生碎身如麻米者以諸佛解脫從眾生得以故臨涅槃時復囑累地藏救護也問何故不囑付文殊彌勒觀音等而唯累地藏菩薩一人耶答論云諸大菩薩佛滅度後各各分散隨至所應度眾生國土彌勒還兜率天上文殊亦至所應度眾生處唯地藏發願為幽冥教主悲心偏向南閻浮提物機所在故特囑之如父臨終不遺命於遊學諸兒特將諸幼子付託在家長男必使教令成才毋傷我愛此囑累人天之意也已上品目生起如綸貫穿攝持一句法言諸妄銷落所集功德不為自求願與法界眾生同向蓮池海會莊嚴淨土記莂親承然後廻入娑婆分身塵剎亦如地藏薩埵救苦六道眾生虗空有盡我願無窮旹皇清康熙二十二年太歲在昭陽大淵獻月貞於涂日建大寒有疾頭陀靈椉書於武原匡菴之優鉢羅室
